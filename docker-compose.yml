#version: '3.8'

# ── 腾讯云部署（apt 和 Docker 镜像均已适配）──
# 1. 配置 Docker 镜像加速:
#    sudo tee /etc/docker/daemon.json <<'EOF'
#    { "registry-mirrors": ["https://mirror.ccs.tencentyun.com"] }
#    EOF
#    sudo systemctl daemon-reload && sudo systemctl restart docker
# 2. Dockerfile 内 apt 源已替换为腾讯云镜像，无需额外处理
# 3. 构建: docker-compose build --no-cache && docker-compose up -d

services:
  app:
    build: .
    container_name: url-destroyer
    ports:
      - "8087:80"
    volumes:
      # 数据目录：挂载宿主机路径到容器内（数据库存在这里）
      # 修改 .env 中的 DATA_DIR 可自定义路径，不设置则默认 ./data
      - ${DATA_DIR:-./data}:/var/www/data
      - ./templates:/var/www/templates
    restart: unless-stopped
    # ── 环境变量配置（可选，不设置则使用默认值）──
    environment:
      - ADMIN_PASSWORD=[redacted]           # 管理员初始密码
      - DEFAULT_ACCESS_TIMEOUT=24         # 默认访问超时（小时）
      - DEFAULT_ABSOLUTE_EXPIRY_HOURS=168 # 默认未打开过期（小时）= 7 天
      # - BASE_URL=https://your-domain.com # 站点 URL（反向代理时设置）
      # - ADMIN_PATH=admin                 # 后台路径（防扫描可改）
      - DB_PATH=/var/www/data/app.db     # 数据库文件路径（entrypoint 和 PHP 均从此读取，保持一致）
      # - DB_TABLE_PREFIX=ud_            # 表名前缀（默认 ud_，设为空则不使用前缀）
      # ── MySQL 配置（取消注释即可切换数据库引擎） ──
      # - DB_DRIVER=mysql                 # 切换为 MySQL（默认 sqlite）
      # - DB_HOST=mysql-container         # MySQL 主机名/服务名
      # - DB_PORT=3306                    # MySQL 端口
      # - DB_DATABASE=url_destroyer       # 数据库名
      # - DB_USERNAME=root                # 用户名
      # - DB_PASSWORD=secret              # 密码
