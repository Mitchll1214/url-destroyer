#version: '3.8'

# ── 腾讯云部署（apt 和 Docker 镜像均已适配）──
# 1. 配置 Docker 镜像加速:
#    sudo tee /etc/docker/daemon.json <<'EOF'
#    { "registry-mirrors": ["https://mirror.ccs.tencentyun.com"] }
#    EOF
#    sudo systemctl daemon-reload && sudo systemctl restart docker
# 2. Dockerfile 内 apt 源已替换为腾讯云镜像，无需额外处理
# 3. 构建: docker-compose build --no-cache && docker-compose up -d

services:
  app:
    build: .
    container_name: url-destroyer
    ports:
      - "8087:80"
    volumes:
      - ./data:/var/www/data
      - ./templates:/var/www/templates
    restart: unless-stopped
    # ── 环境变量配置（可选，不设置则使用默认值）──
    environment:
      - ADMIN_PASSWORD=admin123           # 管理员初始密码
      - DEFAULT_ACCESS_TIMEOUT=24         # 默认访问超时（小时）
      - DEFAULT_ABSOLUTE_EXPIRY_HOURS=168 # 默认未打开过期（小时）= 7 天
      # - BASE_URL=https://your-domain.com # 站点 URL（反向代理时设置）
      # - ADMIN_PATH=admin                 # 后台路径（防扫描可改）
      # - DB_PATH=/var/www/data/app.db     # 数据库文件路径
